---
- name: Configure K3s masters
  hosts: masters
  serial: 1
  become: yes
  vars_files:
    - ../vault/vault.yml
  roles:
    - k3s_master

- name: Linkerd 서비스 메시 설치
  hosts: masters
  become: yes
  roles:
    - linkerd

- name: Cluster Autoscaler 설치
  hosts: masters
  become: yes
  roles:
    - cluster-autoscaler

- name: Prometheus/Grafana 모니터링 스택 설치
  hosts: masters
  become: yes
  vars_files:
    - ../vault/vault.yml
  roles:
    - prometheus