apiVersion: apps/v1
kind: Deployment
metadata:
  name: import-job
  namespace: operator-app
spec:
  replicas: 1  # 중복 처리 방지 — 반드시 1 유지
  selector:
    matchLabels:
      app: import-job
  template:
    metadata:
      labels:
        app: import-job
    spec:
      tolerations:
        - key: nodetype
          operator: Equal
          value: operator
          effect: NoSchedule
      nodeSelector:
        role: operator-worker
      containers:
        - name: import-job
          image: PLACEHOLDER/import-job:latest
          envFrom:
            - configMapRef:
                name: import-job-config
          env:
            - name: RDS_HOST
              valueFrom:
                secretKeyRef:
                  name: import-job-secret
                  key: RDS_HOST
            - name: RDS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: import-job-secret
                  key: RDS_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
