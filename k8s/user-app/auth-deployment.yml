# 로그인 파드 (2개)
# 실제 로그인 웹 이미지로 수정 필요

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-web
  namespace: user-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-web
  template:
    metadata:
      labels:
        app: auth-web
    spec:
      containers:
        - name: auth-web
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
