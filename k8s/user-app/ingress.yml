apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-app-ingress
  namespace: user-app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.priority: "20"
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /user/api
            pathType: Prefix
            backend:
              service:
                name: web-backend
                port:
                  number: 3000
          - path: /user
            pathType: Prefix
            backend:
              service:
                name: web-frontend
                port:
                  number: 80
