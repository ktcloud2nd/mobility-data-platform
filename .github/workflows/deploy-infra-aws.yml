name: deploy-infra-aws

on:
  push:
    branches:
      - main
      - aws-cicd
    paths:
      - "infra/aws/terraform/**"
      - ".github/workflows/deploy-infra-aws.yml"

  pull_request:
    paths:
      - "infra/aws/terraform/**"
      - ".github/workflows/deploy-infra-aws.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-infra-aws
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: "1.8.5"
  # existing code + modified: local state path removed for S3 backend
  # TF_VAR_network_state_path: ../network/terraform.tfstate
  # existing code + modified: remote_state reads use tfstate account creds
  TF_VAR_network_state_access_key: ${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}
  TF_VAR_network_state_secret_key: ${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # existing code + modified: provider credentials stay on infra account
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/aws/terraform

      - name: Prepare compute tfvars from example
        working-directory: infra/aws/terraform/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: infra/aws/terraform/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars

      - name: Network Init
        working-directory: infra/aws/terraform/network
        # existing code + modified: backend init uses tfstate account creds
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Network Validate
        working-directory: infra/aws/terraform/network
        run: terraform validate

      - name: Network Plan
        working-directory: infra/aws/terraform/network
        run: terraform plan -input=false -out=tfplan

      - name: Show Network Plan
        working-directory: infra/aws/terraform/network
        run: terraform show -no-color tfplan

      - name: Compute Init
        working-directory: infra/aws/terraform/compute
        # existing code + modified: backend init uses tfstate account creds
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Compute Validate
        working-directory: infra/aws/terraform/compute
        run: terraform validate

      - name: Data Init
        working-directory: infra/aws/terraform/data
        # existing code + modified: backend init uses tfstate account creds
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Data Validate
        working-directory: infra/aws/terraform/data
        run: terraform validate

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    # existing code + modified: allow apply on aws-cicd before merge
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/aws-cicd') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # existing code + modified: provider credentials stay on infra account
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Prepare compute tfvars from example
        working-directory: infra/aws/terraform/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: infra/aws/terraform/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars

      - name: Network Init
        working-directory: infra/aws/terraform/network
        # existing code + modified: backend init uses tfstate account creds
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Network Apply
        working-directory: infra/aws/terraform/network
        run: terraform apply -input=false -auto-approve

      - name: Compute Init
        working-directory: infra/aws/terraform/compute
        # existing code + modified: backend init uses tfstate account creds
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Compute Apply
        working-directory: infra/aws/terraform/compute
        run: terraform apply -input=false -auto-approve

      - name: Data Init
        working-directory: infra/aws/terraform/data
        # existing code + modified: backend init uses tfstate account creds
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Data Apply
        working-directory: infra/aws/terraform/data
        run: terraform apply -input=false -auto-approve
