# DockerHubмЧР 5к∞Ь мЭілѓЄмІА лєМлУЬ/нСЄмЛЬ
# л°ЬкЈЄмЭЄ/мЬ†м†А/мЪімШБмЮР л∞±мЧФлУЬ 3к∞Ь + мЬ†м†А/мЪімШБмЮР нФДл°†нКЄ 2к∞Ь = міЭ 5к∞Ь
# мЫє мДЬлєДмК§ нММлУЬмЧРмДЬ мВђмЪ©нХ† мЭілѓЄмІА мГЭмД±кЄА

name: 'AWS App Image Deploy'

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - web-anomaly
    paths:
      - '.github/workflows/aws-app-deploy.yml'
      - 'apps/web-platform/backend/**'
      - 'apps/web-platform/frontend/**'

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: login-backend
            image: login-backend
            context: apps/web-platform/backend
            dockerfile: apps/web-platform/backend/Dockerfile
            build_args: |
              APP_TARGET=login
          - name: user-backend
            image: user-backend
            context: apps/web-platform/backend
            dockerfile: apps/web-platform/backend/Dockerfile
            build_args: |
              APP_TARGET=user
          - name: operator-backend
            image: operator-backend
            context: apps/web-platform/backend
            dockerfile: apps/web-platform/backend/Dockerfile
            build_args: |
              APP_TARGET=operator
          - name: user-frontend
            image: user-frontend
            context: apps/web-platform/frontend
            dockerfile: apps/web-platform/frontend/Dockerfile
            build_args: |
              APP_TARGET=user
              NGINX_CONF=nginx.user.conf
              VITE_API_BASE_URL=/api
              VITE_USER_APP_URL=${{ vars.USER_APP_URL || 'http://app.palja.click' }}
              VITE_OPERATOR_APP_URL=${{ vars.OPERATOR_APP_URL || 'http://admin.palja.click' }}
          - name: operator-frontend
            image: operator-frontend
            context: apps/web-platform/frontend
            dockerfile: apps/web-platform/frontend/Dockerfile
            build_args: |
              APP_TARGET=operator
              NGINX_CONF=nginx.operator.conf
              VITE_API_BASE_URL=/api
              VITE_USER_APP_URL=${{ vars.USER_APP_URL || 'http://app.palja.click' }}
              VITE_OPERATOR_APP_URL=${{ vars.OPERATOR_APP_URL || 'http://admin.palja.click' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.service.build_args }}
