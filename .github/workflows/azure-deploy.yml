name: 'Azure Infrastructure Deploy'

on:
  workflow_dispatch:
    inputs:
      action:
        description: '실행할 작업을 선택하세요'
        required: true
        default: 'apply'
        type: choice
        options:
        - apply
        - destroy

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_public_key: ${{ secrets.AZURE_PUBLIC_KEY }}
  TF_VAR_onprem_ip: ${{ secrets.ONPREM_SOURCE_IP }}

jobs:
  build-image:
    name: 'Build and Push Docker Image'
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'apply' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Kafka Connect Image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/azure/ansible/roles/kafka-consumer/templates
          file: ./infra/azure/ansible/roles/kafka-consumer/templates/Dockerfile.j2
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/custom-kafka-connect:latest

      - name: Build and Push Edge Simulator Image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/edge
          file: ./infra/edge/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vehicle-simulator:latest

  terraform-azure:
    name: 'Terraform Azure'
    needs: build-image
    if: |
      always() &&
      (github.event.inputs.action == 'destroy' ||
      (github.event.inputs.action == 'apply' && needs.build-image.result == 'success'))
    runs-on: ubuntu-latest
    outputs:
      bastion_public_ip: ${{ steps.outputs.outputs.bastion_public_ip }}
      broker_public_ip: ${{ steps.outputs.outputs.broker_public_ip }}
      broker_private_ip: ${{ steps.outputs.outputs.broker_private_ip }}
      consumer_private_ip: ${{ steps.outputs.outputs.consumer_private_ip }}
      admin_username: ${{ steps.outputs.outputs.admin_username }}

    defaults:
      run:
        working-directory: infra/azure/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve

      - name: Read Terraform outputs
        if: ${{ github.event.inputs.action == 'apply' }}
        id: outputs
        run: |
          echo "bastion_public_ip=$(terraform output -raw bastion_public_ip)" >> $GITHUB_OUTPUT
          echo "broker_public_ip=$(terraform output -raw broker_public_ip)" >> $GITHUB_OUTPUT
          echo "broker_private_ip=$(terraform output -raw broker_private_ip)" >> $GITHUB_OUTPUT
          echo "consumer_private_ip=$(terraform output -raw consumer_private_ip)" >> $GITHUB_OUTPUT
          echo "admin_username=$(terraform output -raw admin_username)" >> $GITHUB_OUTPUT

  install-bastion-runner:
    name: 'Install Bastion Runner'
    needs: terraform-azure
    if: ${{ github.event.inputs.action == 'apply' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create GitHub runner registration token
        id: runner_token
        env:
          GH_PAT: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          TOKEN=$(curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token | jq -r .token)
          echo "token=${TOKEN}" >> $GITHUB_OUTPUT

      - name: Wait for bastion SSH
        env:
          BASTION_IP: ${{ needs.terraform-azure.outputs.bastion_public_ip }}
          VM_USER: ${{ needs.terraform-azure.outputs.admin_username }}
        run: |
          for i in {1..20}; do
            if ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${VM_USER}@${BASTION_IP} 'echo ready' 2>/dev/null; then
              exit 0
            fi
            sleep 15
          done
          echo "Bastion SSH is not ready"
          exit 1

      - name: Copy runner install script to bastion
        env:
          BASTION_IP: ${{ needs.terraform-azure.outputs.bastion_public_ip }}
          VM_USER: ${{ needs.terraform-azure.outputs.admin_username }}
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa infra/azure/scripts/install-self-hosted-runner.sh ${VM_USER}@${BASTION_IP}:/tmp/install-self-hosted-runner.sh

      - name: Install self-hosted runner on bastion
        env:
          BASTION_IP: ${{ needs.terraform-azure.outputs.bastion_public_ip }}
          VM_USER: ${{ needs.terraform-azure.outputs.admin_username }}
          RUNNER_TOKEN: ${{ steps.runner_token.outputs.token }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${VM_USER}@${BASTION_IP} "chmod +x /tmp/install-self-hosted-runner.sh && /tmp/install-self-hosted-runner.sh https://github.com/${{ github.repository }} ${RUNNER_TOKEN} bastion-runner"

  configure-azure-vms:
    name: 'Configure Azure VMs'
    needs: [terraform-azure, install-bastion-runner]
    if: ${{ github.event.inputs.action == 'apply' }}
    runs-on: [self-hosted, linux, x64, azure-bastion]
    timeout-minutes: 30

    defaults:
      run:
        working-directory: infra/azure/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq curl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible boto3 botocore
          python -m ansible.cli.galaxy collection install amazon.aws community.general

      - name: Terraform Init
        run: terraform init

      - name: Read Terraform outputs
        run: |
          echo "AZURE_STORAGE_NAME=$(terraform output -raw azure_storage_account_name)" >> $GITHUB_ENV
          echo "AZURE_STORAGE_KEY=$(terraform output -raw azure_storage_primary_key)" >> $GITHUB_ENV
          echo "BROKER_PUBLIC_IP=$(terraform output -raw broker_public_ip)" >> $GITHUB_ENV
          echo "BROKER_PRIV_IP=$(terraform output -raw broker_private_ip)" >> $GITHUB_ENV
          echo "CONSUMER_PRIV_IP=$(terraform output -raw consumer_private_ip)" >> $GITHUB_ENV
          echo "VM_USER=$(terraform output -raw admin_username)" >> $GITHUB_ENV

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Generate Ansible inventory
        run: |
          cat <<EOF > azure_hosts.ini
          [azure_broker]
          broker-vm ansible_host=${BROKER_PRIV_IP}

          [azure_consumer]
          consumer-vm ansible_host=${CONSUMER_PRIV_IP}

          [azure_vms:children]
          azure_broker
          azure_consumer

          [azure_vms:vars]
          ansible_user=${VM_USER}
          ansible_ssh_private_key_file=~/.ssh/id_rsa
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Run Ansible playbook
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          terraform -chdir=../../aws/terraform/data init -reconfigure \
            -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

          RDS_ADDR=$(terraform -chdir=../../aws/terraform/data output -raw db_endpoint)

          if [ ! -f "../ansible/roles/kafka-consumer/files/processor.py" ]; then
            echo "Error: processor.py missing in roles/kafka-consumer/files/"
            exit 1
          fi

          python -m ansible.cli.playbook -i azure_hosts.ini ../ansible/playbook.yml \
            -e "rds_endpoint=${RDS_ADDR}" \
            -e "aws_region=${{ vars.AWS_REGION }}" \
            -e "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}" \
            -e "broker_public_ip=${BROKER_PUBLIC_IP}" \
            -e "broker_internal_ip=${BROKER_PRIV_IP}" \
            -e "azure_storage_account_name=${{ env.AZURE_STORAGE_NAME }}" \
            -e "azure_storage_primary_key=${{ env.AZURE_STORAGE_KEY }}" \
            -e "db_name=vehicle_db" \
            -e "db_user=dbadmin"
